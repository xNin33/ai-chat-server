async function performSearch(query) {
  const endpoint = settings.searchEndpoint || 'https://api.duckduckgo.com/';
  const empty = { text: '', sources: [] };
  const apiKey = settings.searchApiKey || '';

  if (endpoint.includes('serper.dev')) {
    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(apiKey ? { 'X-API-KEY': apiKey } : {})
        },
        body: JSON.stringify({ q: query, num: 10 })
      });
      if (!res.ok) throw new Error(`Search: ${res.status}`);
      const data = await res.json();
      const sources = [];
      let text = '';
      if (data.organic) {
        for (const r of data.organic.slice(0, 8)) {
          text += `- ${r.title || ''}: ${r.snippet || ''}\n  ${r.link || ''}\n`;
          if (r.link) sources.push({ title: r.title || '', snippet: (r.snippet || '').slice(0, 120), url: r.link });
        }
      }
      if (data.knowledgeGraph) {
        const kg = data.knowledgeGraph;
        text += `\nKnowledge: ${kg.title || ''} - ${kg.description || ''}\n`;
        if (kg.descriptionLink) sources.push({ title: kg.title || 'Knowledge Graph', snippet: (kg.description || '').slice(0, 120), url: kg.descriptionLink });
      }
      return { text: text.trim(), sources };
    } catch (err) {
      console.error('Serper search error:', err);
      return empty;
    }
  }

  if (endpoint.includes('searx') || endpoint.includes('search')) {
    if (!endpoint.includes('duckduckgo')) {
      try {
        const sep = endpoint.includes('?') ? '&' : '?';
        const url = `${endpoint}${sep}q=${encodeURIComponent(query)}&format=json`;
        const headers = {};
        if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;
        const res = await fetch(url, { headers });
        if (!res.ok) throw new Error(`Search: ${res.status}`);
        const data = await res.json();
        const sources = [];
        let text = '';
        if (data.results && Array.isArray(data.results)) {
          for (const r of data.results.slice(0, 8)) {
            text += `- ${r.title || ''}: ${r.content || ''}\n  ${r.url || ''}\n`;
            if (r.url) sources.push({ title: r.title || '', snippet: (r.content || '').slice(0, 120), url: r.url });
          }
        }
        return { text: text.trim(), sources };
      } catch (err) {
        console.error('SearXNG search error:', err);
      }
    }
  }

  const targetUrl = endpoint.includes('?')
    ? `${endpoint}&q=${encodeURIComponent(query)}&format=json`
    : `${endpoint}?q=${encodeURIComponent(query)}&format=json`;

  const headers = {};
  if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

  const corsProxies = [
    '',  // direct attempt
    'https://corsproxy.io/?',  // primary CORS proxy
    'https://api.allorigins.win/raw?url=',  // backup CORS proxy
  ];

  for (const proxy of corsProxies) {
    const url = proxy ? `${proxy}${encodeURIComponent(targetUrl)}` : targetUrl;
    try {
      const res = await fetch(url, { headers });
      if (!res.ok) continue;
      const raw = await res.text();
      let data;
      try { data = JSON.parse(raw); } catch { continue; }

      const sources = [];
      let text = '';
      if (data.AbstractText || data.Abstract) {
        text += `${data.AbstractText || data.Abstract}\n\n`;
        if (data.AbstractURL) sources.push({ title: data.Heading || 'Abstract', snippet: (data.AbstractText || data.Abstract).slice(0, 120), url: data.AbstractURL });
      }
      const collectTopics = (topics) => {
        if (!Array.isArray(topics)) return;
        for (const t of topics.slice(0, 8)) {
          if (t.Text) { text += `- ${t.Text}\n`; if (t.FirstURL) { text += `  ${t.FirstURL}\n`; sources.push({ title: (t.Text || '').slice(0, 60), snippet: '', url: t.FirstURL }); } }
        }
      };
      collectTopics(data.RelatedTopics);
      if (data.Results && Array.isArray(data.Results)) {
        for (const r of data.Results.slice(0, 8)) {
          const snippet = r.Text || r.Snippet || r.snippet || '';
          const link = r.FirstURL || r.URL || r.url || r.Link || '';
          text += `- ${snippet}\n  ${link}\n`;
          if (link) sources.push({ title: snippet.slice(0, 60), snippet: '', url: link });
        }
      }
      if (data.organic && Array.isArray(data.organic)) {
        for (const r of data.organic.slice(0, 8)) {
          text += `- ${r.title || ''}: ${r.snippet || ''}\n  ${r.link || ''}\n`;
          if (r.link) sources.push({ title: r.title || '', snippet: (r.snippet || '').slice(0, 120), url: r.link });
        }
      }
      const unique = [];
      const seen = new Set();
      for (const s of sources) {
        if (!seen.has(s.url)) { seen.add(s.url); unique.push(s); }
      }
      if (unique.length > 0) {
        return { text: text.trim(), sources: unique.slice(0, 10) };
      }
    } catch { continue; }
  }

  console.error('All search attempts failed (CORS blocked or no results)');
  showToast('Search failed — try Serper.dev endpoint in Settings');
  return empty;
}

function openSettings() {
  document.getElementById('endpointInput').value = settings.endpoint || '';
  document.getElementById('apiKeyInput').value = settings.apiKey || '';
  document.getElementById('modelInput').value = settings.model || 'gpt-4o';
  document.getElementById('modelInput').oninput = refreshCapChips;
  document.getElementById('maxTokensInput').value = settings.maxTokens || 4096;
  document.getElementById('temperatureInput').value = settings.temperature || 0.7;
  document.getElementById('systemPrompt').value = settings.systemPrompt || '';
  document.getElementById('reasoningToggle').checked = !!settings.reasoning;
  document.getElementById('reasoningEffort').value = settings.reasoningEffort || 'medium';
  document.getElementById('webSearchToggle').checked = !!settings.webSearch;
  document.getElementById('searchModeSelect').value = settings.searchMode || 'manual';
  document.getElementById('searchFormatSelect').value = settings.searchFormat || 'auto';
  document.getElementById('searchEndpointInput').value = settings.searchEndpoint || '';
  document.getElementById('searchApiKeyInput').value = settings.searchApiKey || '';
  document.getElementById('streamAnimToggle').checked = settings.streamAnim !== false;
  document.getElementById('searchEndpointGroup').style.display = settings.searchMode === 'manual' ? '' : 'none';
  document.getElementById('searchFormatGroup').style.display = settings.searchMode === 'api' ? '' : 'none';

  // Determine which preset matches the saved system prompt
  const savedPrompt = (settings.systemPrompt || '').trim();
  let matchedPreset = 'Default';
  for (const preset of SYSTEM_PRESETS) {
    const modPrompt = presetModifications[preset.name];
    const effective = modPrompt !== undefined ? modPrompt : preset.prompt;
    if (effective === savedPrompt) {
      matchedPreset = preset.name;
      break;
    }
  }
  selectedPreset = matchedPreset;

  const maxTokensRange = document.getElementById('maxTokensRange');
  const maxTokensValue = document.getElementById('maxTokensValue');
  const maxTokensInput = document.getElementById('maxTokensInput');
  maxTokensRange.value = settings.maxTokens || 4096;
  maxTokensValue.textContent = settings.maxTokens || 4096;
  maxTokensInput.value = settings.maxTokens || 4096;

  const temperatureRange = document.getElementById('temperatureRange');
  const temperatureValue = document.getElementById('temperatureValue');
  const temperatureInput = document.getElementById('temperatureInput');
  temperatureRange.value = settings.temperature || 0.7;
  temperatureValue.textContent = settings.temperature || 0.7;
  temperatureInput.value = settings.temperature || 0.7;

  renderPresetChips();
  refreshCapChips();
  document.getElementById('settingsModal').classList.add('active');
}

function renderPresetChips() {
  const container = document.getElementById('presetChips');
  if (!container) return;
  let html = '';
  for (const preset of SYSTEM_PRESETS) {
    const isActive = selectedPreset === preset.name;
    const isModified = presetModifications[preset.name] !== undefined;
    const cls = `modal-preset-chip${isActive ? ' active' : ''}${isModified ? ' modified' : ''}`;
    html += `<button class="${cls}" onclick="applyPreset('${escapeHtml(preset.name)}')">${escapeHtml(preset.name)}</button>`;
  }
  if (presetModifications[selectedPreset] !== undefined) {
    html += `<button class="modal-preset-reset" onclick="resetCurrentPreset()">↺ Reset</button>`;
  }
  container.innerHTML = html;
}

function applyPreset(name) {
  const preset = SYSTEM_PRESETS.find(p => p.name === name);
  if (!preset) return;
  selectedPreset = name;
  const saved = presetModifications[name];
  _suppressModificationSave = true;
  document.getElementById('systemPrompt').value = saved !== undefined ? saved : preset.prompt;
  _suppressModificationSave = false;
  renderPresetChips();
}

function resetCurrentPreset() {
  const preset = SYSTEM_PRESETS.find(p => p.name === selectedPreset);
  if (!preset) return;
  delete presetModifications[selectedPreset];
  _suppressModificationSave = true;
  document.getElementById('systemPrompt').value = preset.prompt;
  _suppressModificationSave = false;
  renderPresetChips();
}

function exportChat() {
  const conv = currentConv();
  if (!conv || !conv.messages.length) { showToast('No messages to export'); return; }
  let md = `# ${conv.title}\n\n`;
  for (const m of conv.messages) {
    md += `### ${m.role === 'user' ? 'You' : 'AI'}\n`;
    const er = getEffectiveReasoning(m);
    if (er) md += `> **Thinking:**\n> ${er.trim().replace(/\n/g, '\n> ')}\n\n`;
    md += `${getEffectiveContent(m)}\n\n`;
  }
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${conv.title.replace(/[^a-zA-Z0-9一-鿿_-]/g, '_')}.md`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported');
}

let selectedMsgIdx = -1;

function updateProgress() {
  const area = document.getElementById('chatArea');
  const dotsEl = document.getElementById('chatProgressDots');
  const listEl = document.getElementById('chatProgressList');
  const progress = document.getElementById('chatProgress');
  if (!area || !dotsEl || !listEl || !progress) return;
  const hasScroll = area.scrollHeight > area.clientHeight + 20;
  if (!hasScroll) { progress.style.display = 'none'; return; }
  progress.style.display = '';

  const conv = currentConv();
  const msgs = conv ? conv.messages : [];
  const groups = area.querySelectorAll('.message-group');
  const dotsH = dotsEl.clientHeight;
  const viewH = area.clientHeight;
  const scrollTop = area.scrollTop;
  const viewCenter = scrollTop + viewH / 2;

  let closestIdx = -1;
  let closestDist = Infinity;

  // First pass: find closest user message to viewport center
  // Use data-idx attribute to correctly map DOM nodes to message array (virtual scroll may offset)
  groups.forEach((g) => {
    const dataIdx = parseInt(g.dataset.idx);
    if (isNaN(dataIdx)) return;
    const msg = msgs[dataIdx] || {};
    if (msg.role !== 'user') return;
    const rect = g.getBoundingClientRect();
    const areaRect = area.getBoundingClientRect();
    const elTop = rect.top - areaRect.top + scrollTop;
    const elCenter = elTop + rect.height / 2;
    const dist = Math.abs(elCenter - viewCenter);
    if (dist < closestDist) { closestDist = dist; closestIdx = dataIdx; }
  });

  // Second pass: render dots and list items
  let dotsHtml = '';
  let listHtml = '';
  groups.forEach((g) => {
    const dataIdx = parseInt(g.dataset.idx);
    if (isNaN(dataIdx)) return;
    const msg = msgs[dataIdx] || {};
    if (msg.role !== 'user') return;
    const rect = g.getBoundingClientRect();
    const areaRect = area.getBoundingClientRect();
    const elTop = rect.top - areaRect.top + scrollTop;
    const pos = Math.max(2, Math.min((elTop / area.scrollHeight) * dotsH, dotsH - 4));
    const label = getEffectiveContent(msg).replace(/\s+/g, ' ').trim().slice(0, 30);
    dotsHtml += `<div class="dot${dataIdx === closestIdx ? ' active' : ''}" style="top:${pos}px"></div>`;
    listHtml += `<div class="msg-item${dataIdx === closestIdx ? ' active' : ''}${dataIdx === selectedMsgIdx ? ' selected' : ''}" data-idx="${dataIdx}">
      <span class="dot-indicator"></span>
      <span class="msg-label">${escapeHtml(label)}</span>
    </div>`;
  });
  dotsEl.innerHTML = dotsHtml;
  listEl.innerHTML = listHtml;

  listEl.querySelectorAll('.msg-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx);
      selectedMsgIdx = idx;
      const g = area.querySelector(`.message-group[data-idx="${idx}"]`);
      if (g) g.scrollIntoView({ behavior: 'smooth', block: 'center' });
      updateProgress();
    });
  });
}

const placeholderPhrases = {
  normal: ['Send a message...', 'Ask me anything...', 'What\'s on your mind?', 'How can I help?'],
  search: ['Search the web...', 'Find answers...', 'Look up anything...', 'Search and ask...']
};

let placeholderState = {
  phrases: placeholderPhrases.normal,
  phraseIdx: 0,
  charIdx: 0,
  deleting: false,
  timer: null,
  paused: false
};

function startPlaceholderAnimation() {
  const input = document.getElementById('inputEl');
  if (!input) return;
  const conv = currentConv();
  if (conv && conv.messages && conv.messages.length > 0) {
    input.placeholder = placeholderState.phrases[0];
    return;
  }
  placeholderState.paused = false;
  input.classList.add('typing-placeholder');
  tickPlaceholder();
}

function stopPlaceholderAnimation() {
  placeholderState.paused = true;
  clearTimeout(placeholderState.timer);
  const input = document.getElementById('inputEl');
  if (input) input.classList.remove('typing-placeholder');
}

function updatePlaceholderPhrases() {
  placeholderState.phrases = settings.webSearch ? placeholderPhrases.search : placeholderPhrases.normal;
  placeholderState.phraseIdx = 0;
  placeholderState.charIdx = 0;
  placeholderState.deleting = false;
}

function tickPlaceholder() {
  if (placeholderState.paused) return;
  const input = document.getElementById('inputEl');
  if (!input) return;

  const phrases = placeholderState.phrases;
  const currentPhrase = phrases[placeholderState.phraseIdx];

  if (!placeholderState.deleting) {
    placeholderState.charIdx++;
    input.placeholder = currentPhrase.slice(0, placeholderState.charIdx);

    if (placeholderState.charIdx >= currentPhrase.length) {
      placeholderState.timer = setTimeout(() => {
        placeholderState.deleting = true;
        tickPlaceholder();
      }, 2000);
      return;
    }
    placeholderState.timer = setTimeout(tickPlaceholder, 60 + Math.random() * 40);
  } else {
    placeholderState.charIdx--;
    input.placeholder = currentPhrase.slice(0, placeholderState.charIdx);

    if (placeholderState.charIdx <= 0) {
      placeholderState.deleting = false;
      placeholderState.phraseIdx = (placeholderState.phraseIdx + 1) % phrases.length;
      placeholderState.timer = setTimeout(tickPlaceholder, 400);
      return;
    }
    placeholderState.timer = setTimeout(tickPlaceholder, 30);
  }
}

document.getElementById('inputEl').addEventListener('focus', function() {
  if (!this.value) {
    stopPlaceholderAnimation();
    this.placeholder = settings.webSearch ? 'Search the web...' : 'Send a message...';
  }
});

document.getElementById('inputEl').addEventListener('blur', function() {
  if (!this.value) {
    startPlaceholderAnimation();
  }
});

document.getElementById('searchModeSelect').addEventListener('change', function() {
  document.getElementById('searchEndpointGroup').style.display = this.value === 'manual' ? '' : 'none';
  document.getElementById('searchFormatGroup').style.display = this.value === 'api' ? '' : 'none';
});

document.getElementById('systemPrompt').addEventListener('input', function() {
  if (_suppressModificationSave) return;
  presetModifications[selectedPreset] = this.value.trim();
  renderPresetChips();
});

document.getElementById('settingsModal').addEventListener('mousedown', function(e) {
  if (!e.target.closest('.modal')) closeSettings();
});

(async function init() {
  await loadData();
  // clean up empty conversations that may have been saved before
  conversations = conversations.filter(c => c.messages && c.messages.length > 0);
  initTheme();
  await loadThemeFromDB();
  updateThinkingBtn();
  updateSearchBtn();
  updatePlaceholderPhrases();
  if (!currentConv() && conversations.length > 0) {
    currentId = conversations[0].id;
    DB.putSetting('currentId', currentId).catch(() => {});
  }
  renderAll();
  startPlaceholderAnimation();
})();
